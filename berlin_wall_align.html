<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berlin Wall — alignment helper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050608;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #d4d4d4;
            user-select: none;
        }

        /* SVG Layout & Camera */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Map and Path Styling */
        .map-outline {
            fill: #0f131a;
            stroke: #1f2a38;
            stroke-width: 20px; /* Scaled down by its transform */
            stroke-linejoin: round;
        }

        .wall-path {
            fill: rgba(255, 42, 75, 0.08);
            stroke: #ff1e46;
            stroke-width: 8px;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 12px rgba(255, 30, 70, 0.8)) drop-shadow(0 0 4px rgba(255, 255, 255, 0.5));
        }

        .city-label {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 38px;
            fill: #ffffff;
            letter-spacing: 0.3em;
            text-anchor: middle;
            opacity: 1;
        }

        .city-label.sub {
            font-size: 16px;
            font-weight: 400;
            fill: #8892a0;
            letter-spacing: 0.1em;
        }

        /* Live alignment controls */
        .tuner {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 20;
            width: min(380px, calc(100vw - 32px));
            max-height: calc(100vh - 32px);
            overflow: auto;
            padding: 16px 18px;
            box-sizing: border-box;
            background: rgba(12, 14, 18, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            font-size: 13px;
            color: #e8eaef;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        }

        .tuner h1 {
            margin: 0 0 12px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .tuner fieldset {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            margin: 0 0 12px;
            padding: 10px 12px;
        }

        .tuner legend {
            padding: 0 6px;
            font-weight: 600;
            font-size: 12px;
            color: rgba(255, 94, 120, 0.95);
        }

        .tuner .row {
            display: grid;
            grid-template-columns: 72px 1fr 64px;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .tuner .row:last-child {
            margin-bottom: 0;
        }

        .tuner label.key {
            font-variant-numeric: tabular-nums;
            color: #9aa3af;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .tuner input[type="range"] {
            width: 100%;
            accent-color: #ff2a4b;
        }

        .tuner input[type="number"] {
            width: 100%;
            padding: 4px 6px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #050608;
            color: #fff;
            font-family: ui-monospace, monospace;
            font-size: 12px;
        }

        .tuner details {
            margin-bottom: 12px;
            font-size: 12px;
            color: #aeb6c2;
        }

        .tuner summary {
            cursor: pointer;
            user-select: none;
            margin-bottom: 8px;
        }

        .tuner pre {
            margin: 0 0 10px;
            padding: 10px;
            background: #050608;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 11px;
            line-height: 1.45;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .tuner .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tuner button {
            flex: 1;
            min-width: 140px;
            padding: 9px 12px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            background: linear-gradient(180deg, #ff3b5c, #d81236);
            color: #fff;
        }

        .tuner button.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #e8eaef;
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .tuner .hint {
            margin: 8px 0 0;
            font-size: 11px;
            color: #7d8794;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="tuner" id="tuner">
        <h1>Berlin wall alignment</h1>
        <p class="hint">Adjust until the red trace matches the city outline. Copy the snippet and send it back to drop into <code>berlin_wall.html</code>.</p>

        <fieldset>
            <legend>Wall path</legend>
            <div class="row">
                <label class="key" for="wall-scale">Scale</label>
                <input type="range" id="wall-scale" min="0.25" max="1.2" step="0.001" value="0.561">
                <input type="number" id="wall-scale-num" step="0.001" value="0.561">
            </div>
            <div class="row">
                <label class="key" for="wall-tx">Tx</label>
                <input type="range" id="wall-tx" min="-200" max="200" step="0.5" value="122.5">
                <input type="number" id="wall-tx-num" step="0.1" value="122.5">
            </div>
            <div class="row">
                <label class="key" for="wall-ty">Ty</label>
                <input type="range" id="wall-ty" min="-200" max="200" step="0.5" value="-45">
                <input type="number" id="wall-ty-num" step="0.1" value="-45">
            </div>
        </fieldset>

        <details>
            <summary>Map outline transform (usually leave as-is)</summary>
            <fieldset>
                <legend>Map</legend>
                <div class="row">
                    <label class="key" for="map-tx">Tx</label>
                    <input type="range" id="map-tx" min="-500" max="500" step="1" value="197">
                    <input type="number" id="map-tx-num" step="0.1" value="197">
                </div>
                <div class="row">
                    <label class="key" for="map-ty">Ty</label>
                    <input type="range" id="map-ty" min="0" max="1400" step="1" value="1050">
                    <input type="number" id="map-ty-num" step="0.1" value="1050">
                </div>
                <div class="row">
                    <label class="key" for="map-sx">Sx</label>
                    <input type="range" id="map-sx" min="0.02" max="0.25" step="0.0005" value="0.1">
                    <input type="number" id="map-sx-num" step="0.0001" value="0.1">
                </div>
                <div class="row">
                    <label class="key" for="map-sy">Sy</label>
                    <input type="range" id="map-sy" min="-0.25" max="-0.02" step="0.0005" value="-0.1">
                    <input type="number" id="map-sy-num" step="0.0001" value="-0.1">
                </div>
            </fieldset>
        </details>

        <pre id="snippet-out" aria-live="polite"></pre>
        <div class="actions">
            <button type="button" id="copy-snippet">Copy snippet</button>
            <button type="button" id="reset-defaults" class="secondary">Reset defaults</button>
        </div>
    </div>

    <!-- Main Map Visualization -->

        <defs>

                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
            </pattern>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)" />

            ];

            function numInput(id, fallback) {
                const v = parseFloat(document.getElementById(id).value);
                return Number.isFinite(v) ? v : fallback;
            }

            function getValues() {
                return {
                    wallScale: numInput('wall-scale-num', DEFAULTS.wallScale),
                    wallTx: numInput('wall-tx-num', DEFAULTS.wallTx),
                    wallTy: numInput('wall-ty-num', DEFAULTS.wallTy),
                    mapTx: numInput('map-tx-num', DEFAULTS.mapTx),
                    mapTy: numInput('map-ty-num', DEFAULTS.mapTy),
                    mapSx: numInput('map-sx-num', DEFAULTS.mapSx),
                    mapSy: numInput('map-sy-num', DEFAULTS.mapSy),
                };
            }

            function applyTransforms() {
                const v = getValues();
                mapGroup.setAttribute(
                    'transform',
                    `translate(${v.mapTx}, ${v.mapTy}) scale(${v.mapSx}, ${v.mapSy})`
                );
                wallGroup.setAttribute(
                    'transform',
                    `matrix(${v.wallScale} 0 0 ${v.wallScale} ${v.wallTx} ${v.wallTy})`
                );
                snippetOut.textContent = buildSnippet(v);
            }

            function buildSnippet(v) {
                const ws = v.wallScale;
                const f = (n) => (Number.isInteger(n) ? String(n) : n.toFixed(4).replace(/\.?0+$/, ''));
                return [
                    'Values for berlin_wall.html:',
                    '',
                    '1) Wall <g> (replace the wall-group transform):',
                    `<g transform="matrix(${ws} 0 0 ${ws} ${v.wallTx} ${v.wallTy})">`,
                    '',
                    '2) Animation script (wallScale / translates — must match matrix above):',
                    `const wallScale = ${f(ws)};`,
                    `const wallTranslateX = ${f(v.wallTx)};`,
                    `const wallTranslateY = ${f(v.wallTy)};`,
                    '',
                    '3) Map outline <g> (only if you changed map controls):',
                    `<g transform="translate(${v.mapTx}, ${v.mapTy}) scale(${v.mapSx}, ${v.mapSy})">`,
                ].join('\n');
            }

            function wirePair(rangeId, numId) {
                const rangeEl = document.getElementById(rangeId);
                const numEl = document.getElementById(numId);

                function syncFromRange() {
                    numEl.value = rangeEl.value;
                    applyTransforms();
                }
                function syncFromNum() {
                    let n = parseFloat(numEl.value);
                    if (Number.isNaN(n)) return;
                    const min = parseFloat(rangeEl.min);
                    const max = parseFloat(rangeEl.max);
                    n = Math.min(max, Math.max(min, n));
                    numEl.value = n;
                    rangeEl.value = n;
                    applyTransforms();
                }

                rangeEl.addEventListener('input', syncFromRange);
                numEl.addEventListener('change', syncFromNum);
                numEl.addEventListener('keyup', (e) => {
                    if (e.key === 'Enter') syncFromNum();
                });
            }

            function setUIFromDefaults(d) {
                const pairs = [
                    ['wall-scale', 'wall-scale-num', d.wallScale],
                    ['wall-tx', 'wall-tx-num', d.wallTx],
                    ['wall-ty', 'wall-ty-num', d.wallTy],
                    ['map-tx', 'map-tx-num', d.mapTx],
                    ['map-ty', 'map-ty-num', d.mapTy],
                    ['map-sx', 'map-sx-num', d.mapSx],
                    ['map-sy', 'map-sy-num', d.mapSy],
                ];
                for (const [rId, nId, val] of pairs) {
                    document.getElementById(rId).value = val;
                    document.getElementById(nId).value = val;
                }
            }

            fields.forEach(([r, n]) => wirePair(r, n));

            document.getElementById('reset-defaults').addEventListener('click', () => {
                setUIFromDefaults(DEFAULTS);
                applyTransforms();
            });

            document.getElementById('copy-snippet').addEventListener('click', async () => {
                const text = snippetOut.textContent || buildSnippet(getValues());
                try {
                    await navigator.clipboard.writeText(text);
                    const btn = document.getElementById('copy-snippet');
                    const prev = btn.textContent;
                    btn.textContent = 'Copied';
                    setTimeout(() => { btn.textContent = prev; }, 1600);
                } catch {
                    window.prompt('Copy this text:', text);
                }
            });

            setUIFromDefaults(DEFAULTS);
            applyTransforms();
        });
    </script>
</body>
</html>
